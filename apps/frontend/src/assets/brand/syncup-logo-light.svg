<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 44" width="160" height="44" role="img" aria-label="SyncUp">
  <title>SyncUp</title>
  <defs>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ACBD0"/>
      <stop offset="100%" stop-color="#56B6C6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(0,4)">
    <g filter="url(#glow)">
      <rect x="0"  y="14" width="9" height="22" rx="3.5" fill="url(#bar-grad)"/>
      <rect x="13" y="5"  width="9" height="31" rx="3.5" fill="url(#bar-grad)"/>
      <rect x="26" y="20" width="9" height="16" rx="3.5" fill="url(#bar-grad)"/>
    </g>
    <rect x="2"  y="17" width="5" height="2.5" rx="1" fill="#EFE3CA" fill-opacity="0.6"/>
    <rect x="2"  y="22" width="5" height="2.5" rx="1" fill="#EFE3CA" fill-opacity="0.6"/>
    <rect x="15" y="8"  width="5" height="2.5" rx="1" fill="#EFE3CA" fill-opacity="0.6"/>
    <rect x="15" y="14" width="5" height="2.5" rx="1" fill="#EFE3CA" fill-opacity="0.6"/>
    <rect x="15" y="20" width="5" height="2.5" rx="1" fill="#EFE3CA" fill-opacity="0.6"/>
    <rect x="28" y="23" width="5" height="2.5" rx="1" fill="#EFE3CA" fill-opacity="0.6"/>
  </g>

  <line x1="46" y1="9" x2="46" y2="35" stroke="rgba(239,227,202,0.4)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark for dark/indigo backgrounds -->
  <text y="30" font-family="'DM Sans', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">
    <tspan x="54" fill="#EFE3CA">Sync</tspan><tspan fill="#8ACBD0">Up</tspan>
  </text>
</svg>
