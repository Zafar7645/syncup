<header class="nav">
  <div class="nav-brand" routerLink="/dashboard">
    <img src="assets/brand/syncup-icon.svg" width="30" height="30" alt="" aria-hidden="true" />
    <span class="nav-brand-text">Sync<span class="nav-brand-accent">Up</span></span>
  </div>

  @if (title) {
    <div class="nav-breadcrumb">
      <span class="nav-breadcrumb-sep">/</span>
      <span class="nav-breadcrumb-title">{{ title }}</span>
    </div>
  }

  <div class="nav-actions">
    <div class="nav-avatar-wrapper">
      <button class="nav-avatar" (click)="toggleMenu()" aria-label="User menu">
        <span>{{ userInitial }}</span>
      </button>
      @if (menuOpen) {
        <div class="nav-menu">
          <button class="nav-menu-item danger" (click)="logout()">Sign out</button>
        </div>
      }
    </div>
  </div>
</header>
